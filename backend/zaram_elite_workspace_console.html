<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaram - Elite Workspace Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #040509;
            --bg-secondary: #080a13;
            --bg-tertiary: #0e1124;
            --bg-hover: #151a35;
            --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.4);
            --accent-cyber: #38bdf8;
            --accent-cyber-glow: rgba(56, 189, 248, 0.35);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --border: rgba(56, 189, 248, 0.08);
            --border-bright: rgba(56, 189, 248, 0.25);
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow: -15px 0 50px rgba(0,0,0,0.8);
            --zaram-glow: 0 0 25px rgba(56, 189, 248, 0.25);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
        }

        .cosmic-orb-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            left: 50%;
            top: 40%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            pointer-events: none;
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 2;
        }
        .cosmic-orb-container.revealed {
            transform: translate(-50%, -50%) scale(1);
            opacity: 0.65; /* EXACT DESIGN OPACITY REQUEST */
        }
        
        /* UPDATED: 15% Larger Core dimensions (184px vs 160px) and 20% blurrier box shadows */
        .zaram-core-orb {
            width: 184px;
            height: 184px;
            border-radius: 50%;
            background: radial-gradient(circle at center, #000000 35%, #050a1c 60%, #172554 80%, #0284c7 95%, #38bdf8 100%);
            /* Blur increased by 20% (45px -> 54px; 30px -> 36px) and maximum brightness reduced by 25% (opacity parameters softened) */
            box-shadow: 0 0 54px rgba(37, 99, 235, 0.28), inset 0 0 36px rgba(56, 189, 248, 0.40);
            position: relative;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid rgba(56, 189, 248, 0.18);
        }
        .zaram-core-orb::before {
            content: ''; position: absolute; inset: -10px; border-radius: 50%;
            border: 1px dashed rgba(56, 189, 248, 0.35);
            animation: orbRotate 15s linear infinite; pointer-events: none;
        }
        .zaram-core-orb::after {
            content: ''; position: absolute; inset: 6px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), transparent 60%);
            pointer-events: none;
        }
        @keyframes orbRotate { 100% { transform: rotate(360deg); } }

        /* Mapped speech-responsive vocal pulse bindings: Peak brightness capped by 25% */
        .zaram-core-orb.speaking {
            animation: orbVocalPulse 1s ease-in-out infinite alternate;
            box-shadow: 0 0 58px rgba(56, 189, 248, 0.65), inset 0 0 38px rgba(56, 189, 248, 0.55);
            background: radial-gradient(circle at center, #030712 25%, #1e40af 55%, #38bdf8 90%, #ffffff 100%);
            border-color: rgba(255, 255, 255, 0.55);
        }
        @keyframes orbVocalPulse {
            0% { transform: scale(1); box-shadow: 0 0 42px rgba(56, 189, 248, 0.45); }
            100% { transform: scale(1.08); box-shadow: 0 0 68px rgba(56, 189, 248, 0.68); } /* Reduced peak brightness by 25% */
        }

        .sidebar { border-right: 1px solid var(--border-bright); }
        .chat-scroll::-webkit-scrollbar { width: 3px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.15); border-radius: 4px; }
        code { font-family: 'JetBrains Mono', monospace; background: rgba(56, 189, 248, 0.08); color: var(--accent-cyber); padding: 2px 5px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body class="h-screen flex bg-[#040509]">

    <!-- Left Sidebar: Integrated directory and controls -->
    <aside class="w-72 flex flex-col p-4 bg-[#080a13] sidebar z-20 justify-between">
        <div class="flex flex-col flex-1 overflow-hidden">
            <div class="mb-6 flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-[#38bdf8] to-[#2563eb] flex items-center justify-center font-bold text-white text-sm shadow-[0_0_15px_rgba(56,189,248,0.25)]">ZR</div>
                <div class="font-bold text-sm tracking-wider uppercase text-[#f8fafc]">Zaram Engine</div>
            </div>
            
            <button onclick="createNewSession()" class="w-full mb-6 py-3 px-4 bg-gradient-to-r from-cyan-950/20 to-blue-950/10 hover:from-cyan-950/40 border border-sky-900/30 rounded-xl text-xs font-semibold text-sky-400 transition text-left flex items-center justify-between">
                <span>+ New Session</span>
            </button>
            
            <div class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-3 px-1">Recents</div>
            <div id="historyList" class="flex-1 overflow-y-auto space-y-1.5 chat-scroll text-sm text-zinc-400">
                <div class="p-2.5 hover:bg-zinc-900/40 rounded-lg cursor-pointer transition truncate text-zinc-300">MetaHuman ARKit Optimization</div>
                <div class="p-2.5 hover:bg-zinc-900/40 rounded-lg cursor-pointer transition truncate text-zinc-300">Zaram AI Project Roadmap</div>
            </div>
        </div>
        
        <!-- Docked System Controllers -->
        <div class="pt-4 mt-4 border-t border-sky-900/20 space-y-3.5">
            <div class="flex flex-col gap-1.5">
                <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider">Intelligence Hub</label>
                <select id="modelSelector" class="w-full bg-[#0e1124] text-xs text-zinc-300 p-2.5 rounded-lg border border-sky-900/25 outline-none cursor-pointer focus:border-[#38bdf8]/50">
                    <option value="auto">Auto-Route (Smart)</option>
                    <option value="qwen3:latest">qwen3:latest (Coding Brain)</option>
                    <option value="gemma3:latest">gemma3:latest (Logic Brain)</option>
                    <option value="moondream:latest">moondream:latest (Vision Brain)</option>
                    <option value="llama3.2:latest">llama3.2:latest (Convo Brain)</option>
                </select>
            </div>
            <div class="flex flex-col gap-1.5">
                <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider">Persona / Voice</label>
                <select id="characterSelector" class="w-full bg-[#0e1124] text-xs text-zinc-300 p-2.5 rounded-lg border border-sky-900/25 outline-none cursor-pointer focus:border-[#38bdf8]/50">
                    <optgroup label="Female Voice Config">
                        <option value="zaram_prime">Zaram Prime (af_heart)</option>
                        <option value="nova_hacker">Nova Core (af_bella)</option>
                    </optgroup>
                    <optgroup label="Male Voice Config">
                        <option value="baba_elder">Elder Baba (am_adam)</option>
                        <option value="michael_tech">Michael (am_michael)</option>
                    </optgroup>
                </select>
            </div>
            <div class="flex items-center justify-between gap-3 pt-3 border-t border-sky-900/20 mt-2 px-1">
                <div class="flex items-center gap-2.5">
                    <div class="w-8 h-8 rounded-full bg-blue-950/40 flex items-center justify-center font-bold text-sky-400 text-xs border border-sky-800/40">AU</div>
                    <div class="flex flex-col">
                        <span class="font-semibold text-xs text-zinc-200">Anisiuba Uche</span>
                        <span class="text-[9px] text-[#475569] font-mono">v1.0.4 Online</span>
                    </div>
                </div>
                <button class="text-[10px] bg-[#0c0e1a] border border-sky-950 hover:bg-zinc-900 px-2.5 py-1.5 rounded-lg text-zinc-300 font-semibold transition">Upgrade</button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative justify-between overflow-hidden">
        
        <!-- Interactive Pulse Orb Layer: Dynamic emergence scale-0 to scale-100 -->
        <div id="orbContainer" class="cosmic-orb-container">
            <div class="zaram-core-orb" id="centerCoreOrbElement"></div>
        </div>

        <!-- Top Status bar -->
        <header class="w-full p-4 flex justify-between items-center bg-transparent z-10">
            <div class="text-[11px] font-mono text-[#475569] tracking-wider">// ACTIVE CONSOLE SANDBOX</div>
            <button onclick="wipeDisplaySession()" class="p-1 text-zinc-500 hover:text-red-400 transition" title="Clear Workspace View">🗑️</button>
        </header>

        <div id="chatArea" class="flex-1 overflow-y-auto px-6 py-4 flex flex-col transition-all duration-700 z-10 justify-center">
            <div id="gatewayView" class="max-w-2xl mx-auto text-center space-y-4 pt-10 transition-all duration-700 opacity-100">
                <h1 class="text-4xl font-semibold tracking-tight text-zinc-100">Where should we begin?</h1>
            </div>
            <div id="messageLog" class="max-w-3xl mx-auto w-full space-y-6 hidden pt-4"></div>
        </div>

        <div id="inputArea" class="p-6 transition-all duration-1000 ease-in-out transform -translate-y-[25vh] z-10 relative">
            <div class="max-w-3xl mx-auto relative">
                <div id="fileAttachmentStage" class="hidden mb-3"></div>
                <div class="bg-[#0b0c16]/90 backdrop-blur-md border border-sky-950 rounded-2xl p-3 flex flex-col gap-2 shadow-[0_15px_35px_rgba(0,0,0,0.8)] focus-within:border-sky-800 transition">
                    <textarea id="mainInput" placeholder="Ask Zaram anything..." rows="2" class="w-full bg-transparent border-none outline-none resize-none text-sm text-zinc-100 placeholder-zinc-500 px-2 pt-1" onkeydown="handleKeyPress(event)"></textarea>
                    
                    <div class="flex justify-between items-center border-t border-sky-950/40 pt-2 px-1">
                        <div class="flex items-center">
                            <input type="file" id="fileAttachmentInput" class="hidden" onchange="handleFileSelection(this)">
                            <!-- Attachment Trigger File selector -->
                            <button onclick="document.getElementById('fileAttachmentInput').click()" class="p-2 text-zinc-400 hover:text-sky-400 hover:bg-sky-950/20 rounded-xl transition" title="Upload Document File">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4.5 h-4.5"><path stroke-linecap="round" stroke-linejoin="round" d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94a3 3 0 114.243 4.243L8.567 17.825a1.5 1.5 0 01-2.122-2.122l8.84-8.84m-8.84 8.84l4.243-4.243" /></svg>
                            </button>
                            <span id="fileBadge" class="hidden text-[10px] bg-sky-950 text-sky-400 border border-sky-900/50 px-2 py-0.5 rounded-md ml-2 font-mono"></span>
                        </div>
                        <button id="sendBtn" onclick="executeOrchestratorQuery()" class="bg-zinc-100 hover:bg-white text-zinc-950 font-bold px-4 py-1.5 rounded-xl text-xs transition">
                            Send
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <div id="sandboxDrawer" class="w-0 flex flex-col bg-[#070b16] sidebar z-30 justify-between transition-all duration-500 ease-in-out relative overflow-hidden h-screen">
        <button onclick="toggleSandbox()" class="absolute top-4 right-4 text-zinc-500 hover:text-white p-2">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
        <div class="p-6 pt-16 flex-1 flex flex-col overflow-hidden">
            <h2 class="text-xs font-bold tracking-widest text-sky-400 uppercase mb-4">// INSPECTION SANDBOX</h2>
            <div id="sandboxContent" class="flex-1 bg-[#040509] border border-sky-950/60 rounded-xl p-4 font-mono text-xs chat-scroll overflow-y-auto text-zinc-300">
                // Double-click text cards or code items in the stream to open...
            </div>
        </div>
    </div>

    <audio id="globalPipelineAudioNode" preload="auto"></audio>

    <script>
        let isFirstInteraction = true;
        let isSandboxOpen = false;
        const audioNode = document.getElementById('globalPipelineAudioNode');
        const coreOrb = document.getElementById('centerCoreOrbElement');

        // Monitor speech events to toggle rotating orb voice glowing mode
        audioNode.addEventListener('play', () => { coreOrb.classList.add('speaking'); });
        audioNode.addEventListener('ended', () => { coreOrb.classList.remove('speaking'); });
        audioNode.addEventListener('pause', () => { coreOrb.classList.remove('speaking'); });

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                executeOrchestratorQuery();
            }
        }

        function handleFileSelection(input) {
            const badge = document.getElementById('fileBadge');
            if(input.files.length > 0) { 
                badge.innerText = `📎 ${input.files[0].name.toUpperCase()}`; 
                badge.classList.remove('hidden'); 
            } else { 
                badge.classList.add('hidden'); 
            }
        }
        
        function toggleSandbox(content = null) {
            const drawer = document.getElementById('sandboxDrawer');
            if (content) { document.getElementById('sandboxContent').innerText = content; }
            if (isSandboxOpen && !content) { drawer.classList.add('w-0'); isSandboxOpen = false; } 
            else { drawer.classList.remove('w-0'); drawer.classList.add('w-[500px]'); isSandboxOpen = true; }
        }

        async function executeOrchestratorQuery() {
            const input = document.getElementById('mainInput');
            const queryText = input.value.trim();
            const btn = document.getElementById('sendBtn');
            const fileInput = document.getElementById('fileAttachmentInput');
            const log = document.getElementById('messageLog');
            
            if (!queryText) return;
            
            audioNode.pause();

            if (isFirstInteraction) {
                document.getElementById('gatewayView').classList.add('hidden');
                const chatArea = document.getElementById('chatArea');
                chatArea.classList.remove('justify-center');
                chatArea.classList.add('pb-4');
                document.getElementById('inputArea').classList.remove('-translate-y-[25vh]');
                document.getElementById('inputArea').classList.add('translate-y-0');
                log.classList.remove('hidden');
                
                // Cinematic boot transition: Grow and fade-in the high-definition rotating orb
                document.getElementById('orbContainer').classList.add('revealed');
                isFirstInteraction = false;
            }

            // Append User prompt locally to view
            log.innerHTML += `
                <div class="flex justify-end animate-fade-in mb-4">
                    <div class="bg-zinc-900/60 text-zinc-100 text-sm max-w-xl px-4 py-2.5 rounded-2xl border border-sky-950/40">${queryText}</div>
                </div>
            `;
            
            input.value = ''; 
            btn.innerText = 'Routing...'; 
            btn.disabled = true;
            document.getElementById('fileBadge').classList.add('hidden');

            const selectedModel = document.getElementById('modelSelector').value;
            const selectedCharacter = document.getElementById('characterSelector').value;

            // Prepare robust Payload mapping matching the backend's expectations perfectly
            const payload = {
                text: queryText,
                character_id: selectedCharacter,
                brain_id: selectedModel,
                filename: fileInput.files.length > 0 ? fileInput.files[0].name : null
            };

            const mainChatContainer = document.getElementById('chatArea');
            mainChatContainer.scrollTop = mainChatContainer.scrollHeight;

            try {
                // Fetch call making connection with python back-end running on port 8000
                const response = await fetch('http://127.0.0.1:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP Error Status: ${response.status}`);
                }

                const data = await response.json();
                const botText = data.text || "Orchestrator pipeline synced cleanly.";
                const audioUrl = data.audio_url || null;

                // Render structured answer
                log.innerHTML += `
                    <div class="flex justify-start mb-4">
                        <div class="bg-[#0b0c16]/50 border border-sky-950/60 backdrop-blur-md text-zinc-300 text-sm max-w-xl px-4 py-3 rounded-2xl relative">
                            <span class="text-[10px] text-sky-400 block font-mono mb-1.5 uppercase tracking-widest">${selectedCharacter.replace('_', ' ')} (via ${data.model_used || selectedModel})</span>
                            <div class="prose prose-sm prose-invert" ondblclick="toggleSandbox(this.innerText)">${botText}</div>
                        </div>
                    </div>
                `;
                
                // Mapped live TTS audio streaming path play trigger
                if (audioUrl) {
                    audioNode.src = `http://127.0.0.1:8000${audioUrl}`;
                    audioNode.play().catch(err => console.log("Audio awaiting gesture prompt activation."));
                }

            } catch (error) {
                console.error('Connection failed:', error);
                log.innerHTML += `
                    <div class="flex justify-start mb-4">
                        <div class="bg-red-950/30 border border-red-900/60 text-red-200 text-sm max-w-xl px-4 py-2.5 rounded-2xl">
                            <span class="text-[10px] text-red-400 block font-mono mb-1 uppercase tracking-wider">ROUTING EXCEPTION</span>
                            Failed to establish a handshake connection with the Python FastAPI server. Verify 'main.py' is running on port 8000.
                        </div>
                    </div>
                `;
            } finally {
                btn.innerText = 'Send'; 
                btn.disabled = false; 
                fileInput.value = '';
                mainChatContainer.scrollTop = mainChatContainer.scrollHeight;
            }
        }

        function createNewSession() { location.reload(); }
        function wipeDisplaySession() { document.getElementById('messageLog').innerHTML = ''; }
    </script>
</body>
</html>
