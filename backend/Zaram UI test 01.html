<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaram - Elite Workspace Console</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.6);
            border-right: 1px solid #2a2a3e;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        
        .status {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #2a2a3e;
        }
        
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.online {
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
        }
        
        .status-indicator.offline {
            background: #ef4444;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #2a2a3e;
        }
        
        .message {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .message-bubble {
            max-width: 70%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            border: 1px solid #2a2a3e;
            line-height: 1.6;
        }
        
        .message.user .message-bubble {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }
        
        .input-container {
            display: flex;
            gap: 12px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            border: 1px solid #2a2a3e;
        }
        
        #messageInput {
            flex: 1;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        #messageInput:focus {
            border-color: #667eea;
        }
        
        .btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .audio-player {
            margin-top: 12px;
            width: 100%;
        }
        
        .audio-player audio {
            width: 100%;
            height: 40px;
        }
        
        .debug-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid #2a2a3e;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            display: none;
        }
        
        .debug-panel.show {
            display: block;
        }
        
        .debug-log {
            color: #10b981;
            margin-bottom: 5px;
        }
        
        .debug-error {
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo">ZR</div>
            <div class="status">
                <span class="status-indicator offline" id="statusIndicator"></span>
                <span id="statusText">Connecting...</span>
            </div>
            <div style="margin-top: auto; font-size: 12px; color: #666;">
                Zaram Engine v3.2<br>
                Local AI Assistant
            </div>
        </div>
        
        <div class="main-content">
            <div class="chat-container" id="chatContainer">
                <div class="message">
                    <div class="avatar">ZR</div>
                    <div class="message-bubble">
                        Welcome to Zaram. I am online and ready to assist. How can I help you today?
                    </div>
                </div>
            </div>
            
            <div class="input-container">
                <input type="text" id="messageInput" placeholder="Type your message..." autofocus>
                <button class="btn" onclick="sendMessage()">Send</button>
                <button class="btn" onclick="testAudio()">Test Audio</button>
            </div>
        </div>
    </div>
    
    <div class="debug-panel" id="debugPanel"></div>

    <script>
        let SERVER_URL = 'http://127.0.0.1:8000';
        let audioContext = null;
        
        // Initialize
        window.onload = function() {
            checkServer();
            document.getElementById('messageInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') sendMessage();
            });
        };
        
        async function checkServer() {
            try {
                const response = await fetch(`${SERVER_URL}/health`, {
                    mode: 'cors',
                    timeout: 3000
                });
                if (response.ok) {
                    document.getElementById('statusIndicator').className = 'status-indicator online';
                    document.getElementById('statusText').textContent = 'Zaram Online';
                    logDebug('Server connected successfully');
                }
            } catch (error) {
                document.getElementById('statusText').textContent = 'Server Offline';
                logDebug(`Connection failed: ${error.message}`, true);
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            
            // Add user message
            addMessage(message, 'user');
            input.value = '';
            
            // Show typing indicator
            const typingId = showTyping();
            
            try {
                const formData = new FormData();
                formData.append('message', message);
                
                const response = await fetch(`${SERVER_URL}/chat`, {
                    method: 'POST',
                    mode: 'cors',
                    body: formData
                });
                
                removeTyping(typingId);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                logDebug(`Response received: ${data.response_speech || data.response}`);
                
                // Add AI message with audio
                addMessage(data.response, 'ai', data.audio_url);
                
                // Auto-play audio
                if (data.audio_url) {
                    await playAudio(data.audio_url);
                }
                
            } catch (error) {
                removeTyping(typingId);
                logDebug(`Error: ${error.message}`, true);
                addMessage('Error: Could not connect to Zaram server. Make sure it is running.', 'ai');
            }
        }
        
        async function testAudio() {
            logDebug('Testing audio endpoint...');
            try {
                const response = await fetch(`${SERVER_URL}/chat`, {
                    method: 'POST',
                    mode: 'cors',
                    body: new URLSearchParams({
                        message: 'Say hello'
                    })
                });
                
                const data = await response.json();
                logDebug(`Audio URL: ${data.audio_url}`);
                
                if (data.audio_url) {
                    addMessage('Audio test message', 'ai', data.audio_url);
                    await playAudio(data.audio_url);
                } else {
                    logDebug('No audio URL in response', true);
                }
            } catch (error) {
                logDebug(`Test failed: ${error.message}`, true);
            }
        }
        
        async function playAudio(url) {
            return new Promise((resolve, reject) => {
                const audio = new Audio(url);
                audio.addEventListener('canplaythrough', () => {
                    logDebug('Audio ready to play');
                    audio.play().then(() => {
                        logDebug('Audio playing');
                    }).catch(err => {
                        logDebug(`Playback failed: ${err.message}`, true);
                        reject(err);
                    });
                });
                audio.addEventListener('ended', () => {
                    logDebug('Audio finished');
                    resolve();
                });
                audio.addEventListener('error', (e) => {
                    logDebug(`Audio load error: ${e.message}`, true);
                    reject(e);
                });
            });
        }
        
        function addMessage(text, sender, audioUrl = null) {
            const container = document.getElementById('chatContainer');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = sender === 'user' ? 'YOU' : 'ZR';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;
            
            if (audioUrl) {
                const audioDiv = document.createElement('div');
                audioDiv.className = 'audio-player';
                audioDiv.innerHTML = `<audio controls src="${audioUrl}"></audio>`;
                bubble.appendChild(audioDiv);
            }
            
            msgDiv.appendChild(avatar);
            msgDiv.appendChild(bubble);
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        function showTyping() {
            const container = document.getElementById('chatContainer');
            const id = 'typing-' + Date.now();
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.id = id;
            msgDiv.innerHTML = `
                <div class="avatar">ZR</div>
                <div class="message-bubble">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <div style="display: flex; gap: 4px;">
                            <div style="width: 8px; height: 8px; background: #667eea; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out;"></div>
                            <div style="width: 8px; height: 8px; background: #667eea; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out 0.2s;"></div>
                            <div style="width: 8px; height: 8px; background: #667eea; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out 0.4s;"></div>
                        </div>
                        <span style="color: #888; font-size: 13px;">Zaram is thinking...</span>
                    </div>
                </div>
            `;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
            return id;
        }
        
        function removeTyping(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }
        
        function logDebug(message, isError = false) {
            const panel = document.getElementById('debugPanel');
            const log = document.createElement('div');
            log.className = isError ? 'debug-log debug-error' : 'debug-log';
            log.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            panel.appendChild(log);
            panel.scrollTop = panel.scrollHeight;
            panel.classList.add('show');
        }
    </script>
</body>
</html>
