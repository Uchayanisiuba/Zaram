<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zaram — Test UI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f14;
    color: #e4e4e7;
    height: 100vh;
    overflow: hidden;
  }
  .app { display: flex; height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 260px;
    background: #16161d;
    border-right: 1px solid #27272a;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    font-weight: 700;
    color: #a78bfa;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: white;
  }
  .status-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #1f1f28;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ef4444;
    transition: background 0.3s;
  }
  .status-dot.online { background: #10b981; box-shadow: 0 0 8px #10b981; }
  .status-dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% {opacity:1;} 50% {opacity:0.4;} }

  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #71717a;
    margin-top: 8px;
  }
  .feature-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: #1f1f28;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .feature-toggle:hover { background: #27272a; }
  .feature-toggle.active { background: #7c3aed; }
  .feature-toggle .label { display: flex; align-items: center; gap: 8px; font-size: 14px; }

  .quick-test {
    padding: 10px 12px;
    background: #1f1f28;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .quick-test:hover { background: #27272a; }

  .model-select {
    width: 100%;
    padding: 10px 12px;
    background: #1f1f28;
    border: 1px solid #27272a;
    border-radius: 8px;
    color: #e4e4e7;
    font-size: 13px;
    cursor: pointer;
  }

  .new-chat-btn {
    padding: 12px;
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
    transition: transform 0.1s;
  }
  .new-chat-btn:hover { transform: translateY(-1px); }

  /* Main */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .topbar {
    padding: 16px 24px;
    border-bottom: 1px solid #27272a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #16161d;
  }
  .topbar-title { font-size: 16px; font-weight: 600; }
  .topbar-actions { display: flex; gap: 8px; }
  
  /* Improved Top Right Icons */
  .icon-btn {
    width: 36px; height: 36px;
    background: #1f1f28;
    border: 1px solid #27272a;
    border-radius: 8px;
    color: #e4e4e7;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .icon-btn:hover { 
    background: #27272a; 
    color: #a78bfa;
    transform: translateY(-1px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  }
  .icon-btn:active { transform: translateY(0); }
  .icon-btn svg { width: 18px; height: 18px; }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .welcome {
    text-align: center;
    margin: auto;
    max-width: 500px;
  }
  .welcome h1 {
    font-size: 32px;
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }
  .welcome p { color: #a1a1aa; margin-bottom: 24px; }

  /* Messages */
  .message {
    display: flex;
    gap: 12px;
    max-width: 85%;
    animation: fadeIn 0.3s;
  }
  @keyframes fadeIn { from {opacity:0; transform:translateY(8px);} to {opacity:1; transform:translateY(0);} }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .avatar.user { background: #3b82f6; color: white; }
  .avatar.ai { background: linear-gradient(135deg, #a78bfa, #7c3aed); color: white; }

  .bubble {
    background: #1f1f28;
    border: 1px solid #27272a;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.6;
    word-wrap: break-word;
    position: relative;
  }
  .message.user .bubble {
    background: #3b82f6;
    border-color: #3b82f6;
    color: white;
  }
  .bubble.error {
    background: #7f1d1d;
    border-color: #ef4444;
    color: #fca5a5;
  }
  .bubble .meta {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: #27272a;
    color: #a1a1aa;
  }
  .badge.search { background: #7c3aed; color: white; }
  .badge.model { background: #1e3a8a; color: #93c5fd; }

  .audio-player { margin-top: 10px; width: 100%; max-width: 320px; }
  audio { width: 100%; height: 32px; filter: invert(0.9) hue-rotate(180deg); }

  .bubble-actions {
    position: absolute;
    top: -12px;
    right: 8px;
    display: none;
    gap: 4px;
    background: #16161d;
    border: 1px solid #27272a;
    border-radius: 6px;
    padding: 2px;
  }
  .bubble:hover .bubble-actions { display: flex; }
  .mini-btn {
    background: transparent;
    border: none;
    color: #a1a1aa;
    cursor: pointer;
    padding: 4px 6px;
    font-size: 12px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mini-btn:hover { background: #27272a; color: #e4e4e7; }
  .mini-btn svg { width: 14px; height: 14px; }

  /* Code blocks */
  pre {
    background: #0a0a0f;
    border: 1px solid #27272a;
    border-radius: 8px;
    padding: 12px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 13px;
    position: relative;
  }
  pre .copy-code {
    position: absolute;
    top: 8px;
    right: 8px;
    background: #27272a;
    border: none;
    color: #e4e4e7;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
  }
  pre .copy-code:hover { background: #3f3f46; }
  code.inline {
    background: #0a0a0f;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Consolas', monospace;
    font-size: 13px;
  }

  /* Input area */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid #27272a;
    background: #16161d;
  }
  .input-wrapper {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: #1f1f28;
    border: 1px solid #27272a;
    border-radius: 12px;
    padding: 8px;
    transition: border-color 0.2s;
  }
  .input-wrapper:focus-within { border-color: #7c3aed; }
  .input-wrapper textarea {
    flex: 1;
    background: transparent;
    border: none;
    color: #e4e4e7;
    font-size: 14px;
    resize: none;
    outline: none;
    font-family: inherit;
    padding: 8px;
    max-height: 150px;
    min-height: 24px;
  }
  .input-btn {
    width: 36px; height: 36px;
    background: transparent;
    border: none;
    color: #a1a1aa;
    cursor: pointer;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .input-btn:hover { background: #27272a; color: #e4e4e7; }
  .input-btn svg { width: 18px; height: 18px; }
  .input-btn.send {
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    color: white;
  }
  .input-btn.send:disabled { opacity: 0.4; cursor: not-allowed; }
  .input-btn.recording {
    background: #ef4444;
    color: white;
    animation: pulse 1s infinite;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1f1f28;
    border: 1px solid #27272a;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: #7f1d1d; border-color: #ef4444; color: #fca5a5; }

  /* Loading */
  .typing {
    display: inline-flex;
    gap: 4px;
    padding: 8px 0;
  }
  .typing span {
    width: 6px; height: 6px;
    background: #7c3aed;
    border-radius: 50%;
    animation: bounce 1.4s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">Z</div>
      <span>Zaram</span>
    </div>

    <div class="status-badge" onclick="checkHealth()" title="Click to refresh">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>

    <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>

    <div class="section-title">Features</div>
    <div class="feature-toggle" id="toggleSearch" onclick="toggleFeature('search')">
      <span class="label">🌐 Web Search</span>
      <span id="searchStatus">Off</span>
    </div>
    <div class="feature-toggle active" id="toggleAudio" onclick="toggleFeature('audio')">
      <span class="label">🔊 Auto Audio</span>
      <span id="audioStatus">On</span>
    </div>

    <div class="section-title">Quick Tests</div>
    <div class="quick-test" onclick="quickTest('Hello Zaram, what can you do?')">💬 Basic Chat</div>
    <div class="quick-test" onclick="quickTest('What is the latest news about AI?')">🔍 Web Search</div>
    <div class="quick-test" onclick="toggleVoice()">🎤 Voice Input</div>
    <div class="quick-test" onclick="document.getElementById('fileInput').click()">🖼️ Upload Image</div>

    <div class="section-title">AI Model</div>
    <select class="model-select" id="modelSelect">
      <option value="">Auto (Recommended)</option>
      <option value="qwen3">Qwen3 (General)</option>
      <option value="gemma3">Gemma3 (Vision)</option>
      <option value="llama3.2">Llama 3.2 (Light)</option>
      <option value="moondream">Moondream (Vision)</option>
    </select>

    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-title" id="chatTitle">New Conversation</div>
      <div class="topbar-actions">
        <button class="icon-btn" onclick="exportChat()" title="Export chat as text file">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        </button>
        <button class="icon-btn" onclick="clearChat()" title="Clear conversation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </button>
      </div>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="welcome" id="welcome">
        <h1>Welcome to Zaram</h1>
        <p>Your local AI assistant with voice, vision, and web search.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="userInput" placeholder="Message Zaram..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="input-btn" onclick="document.getElementById('fileInput').click()" title="Upload image">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
        </button>
        <button class="input-btn" id="micBtn" onclick="toggleVoice()" title="Voice input">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
        </button>
        <button class="input-btn send" id="sendBtn" onclick="sendMessage()" title="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
  const API_BASE = 'http://localhost:8000';
  let features = { search: false, audio: true };
  let isRecording = false;
  let messageCounter = 0;

  async function checkHealth() {
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    dot.className = 'status-dot connecting';
    text.textContent = 'Connecting...';
    try {
      const res = await fetch(`${API_BASE}/health`);
      if (res.ok) {
        dot.className = 'status-dot online';
        text.textContent = 'Zaram Online';
        return true;
      }
    } catch (e) {}
    dot.className = 'status-dot';
    text.textContent = 'Server Offline';
    return false;
  }

  async function autoConnect() {
    const ok = await checkHealth();
    if (!ok) setTimeout(autoConnect, 5000);
  }
  autoConnect();
  setInterval(checkHealth, 30000);

  function toggleFeature(name) {
    features[name] = !features[name];
    const el = document.getElementById(`toggle${name.charAt(0).toUpperCase()+name.slice(1)}`);
    const status = document.getElementById(`${name}Status`);
    if (features[name]) { el.classList.add('active'); status.textContent = 'On'; }
    else { el.classList.remove('active'); status.textContent = 'Off'; }
  }

  function newChat() {
    clearChat();
    showToast('New conversation started');
  }

  function clearChat() {
    document.getElementById('chatArea').innerHTML = '<div class="welcome" id="welcome"><h1>Welcome to Zaram</h1><p>Your local AI assistant with voice, vision, and web search.</p></div>';
  }

  function exportChat() {
    const messages = document.querySelectorAll('.message');
    if (messages.length === 0) { showToast('No messages to export'); return; }
    let text = 'Zaram Chat Export\n' + '='.repeat(40) + '\n\n';
    messages.forEach(m => {
      const isUser = m.classList.contains('user');
      const content = m.querySelector('.bubble').innerText;
      text += `${isUser ? 'You' : 'Zaram'}:\n${content}\n\n`;
    });
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `zaram_chat_${Date.now()}.txt`;
    a.click();
    showToast('Chat exported');
  }

  function quickTest(msg) {
    document.getElementById('userInput').value = msg;
    sendMessage();
  }

  function addMessage(content, isUser, meta = {}) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const area = document.getElementById('chatArea');
    const msgId = 'msg_' + (++messageCounter);
    const div = document.createElement('div');
    div.className = 'message ' + (isUser ? 'user' : 'ai');
    div.id = msgId;

    const avatar = document.createElement('div');
    avatar.className = 'avatar ' + (isUser ? 'user' : 'ai');
    avatar.textContent = isUser ? '👤' : 'Z';

    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (meta.error ? ' error' : '');

    if (isUser) {
      bubble.innerHTML = escapeHtml(content).replace(/\n/g, '<br>');
    } else {
      bubble.innerHTML = renderMarkdown(content);
    }

    if (!isUser && !meta.error && (meta.model || meta.searchUsed)) {
      const metaDiv = document.createElement('div');
      metaDiv.className = 'meta';
      if (meta.searchUsed) metaDiv.innerHTML += '<span class="badge search">🌐 Web Search Used</span>';
      if (meta.model) metaDiv.innerHTML += `<span class="badge model">🧠 ${meta.model}</span>`;
      bubble.appendChild(metaDiv);
    }

    if (!isUser && !meta.error && meta.audioUrl) {
      const audioDiv = document.createElement('div');
      audioDiv.className = 'audio-player';
      audioDiv.innerHTML = `<audio controls src="${API_BASE}${meta.audioUrl}" id="audio_${msgId}"></audio>`;
      bubble.appendChild(audioDiv);

      if (features.audio) {
        setTimeout(() => {
          const audio = document.getElementById(`audio_${msgId}`);
          if (audio) audio.play().catch(e => console.log('Auto-play blocked:', e));
        }, 300);
      }
    }

    if (!isUser) {
      const actions = document.createElement('div');
      actions.className = 'bubble-actions';
      actions.innerHTML = `
        <button class="mini-btn" onclick="copyMessage('${msgId}')" title="Copy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        </button>
        <button class="mini-btn" onclick="downloadMessage('${msgId}')" title="Download">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        </button>
      `;
      bubble.appendChild(actions);
    }

    div.appendChild(avatar);
    div.appendChild(bubble);
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    return msgId;
  }

  function addTypingIndicator() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'message ai';
    div.id = 'typing_indicator';
    div.innerHTML = `
      <div class="avatar ai">Z</div>
      <div class="bubble">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>
    `;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function removeTypingIndicator() {
    const el = document.getElementById('typing_indicator');
    if (el) el.remove();
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function renderMarkdown(text) {
    let safeText = escapeHtml(text);
    safeText = safeText.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
      const id = 'code_' + Math.random().toString(36).substr(2, 9);
      return `<pre data-code-id="${id}"><button class="copy-code" onclick="copyCode('${id}')">📋 Copy</button><code>${code.trim()}</code></pre>`;
    });
    safeText = safeText.replace(/`([^`]+)`/g, '<code class="inline">$1</code>');
    safeText = safeText.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    safeText = safeText.replace(/\*(.+?)\*/g, '<em>$1</em>');
    safeText = safeText.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:#a78bfa">$1</a>');
    safeText = safeText.replace(/\n/g, '<br>');
    return safeText;
  }

  function copyCode(id) {
    const pre = document.querySelector(`[data-code-id="${id}"]`);
    if (!pre) return;
    const code = pre.querySelector('code').textContent;
    navigator.clipboard.writeText(code).then(() => showToast('Code copied'));
  }

  function copyMessage(id) {
    const msg = document.getElementById(id);
    if (!msg) return;
    const text = msg.querySelector('.bubble').innerText;
    navigator.clipboard.writeText(text).then(() => showToast('Message copied'));
  }

  function downloadMessage(id) {
    const msg = document.getElementById(id);
    if (!msg) return;
    const text = msg.querySelector('.bubble').innerText;
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `zaram_message_${id}.txt`;
    a.click();
    showToast('Message downloaded');
  }

  // CRITICAL FIX: Use FormData instead of JSON to prevent 422 errors
  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, true);
    input.value = '';
    autoResize(input);
    addTypingIndicator();

    const formData = new FormData();
    formData.append('message', text);
    
    const model = document.getElementById('modelSelect').value;
    if (model) formData.append('model', model);
    
    // FastAPI Form(bool) expects 'true' or 'false' string
    formData.append('web_search_override', features.search ? 'true' : 'false');

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        body: formData // DO NOT set Content-Type header
      });
      
      if (!res.ok) {
        const errorText = await res.text();
        throw new Error(`Server error ${res.status}: ${errorText}`);
      }
      
      const data = await res.json();
      removeTypingIndicator();

      if (data.status === 'success') {
        addMessage(data.response_display || data.response, false, {
          model: data.model_used,
          searchUsed: data.web_search_used,
          audioUrl: data.audio_url
        });
      } else {
        addMessage('Error: ' + (data.response || 'Unknown error'), false, { error: true });
      }
    } catch (e) {
      removeTypingIndicator();
      addMessage('Connection error: ' + e.message, false, { error: true });
    }
  }

  async function toggleVoice() {
    const btn = document.getElementById('micBtn');
    if (isRecording) {
      isRecording = false;
      btn.classList.remove('recording');
      addTypingIndicator();
      try {
        const res = await fetch(`${API_BASE}/stop_listening`, { method: 'POST' });
        const data = await res.json();
        removeTypingIndicator();
        if (data.status === 'success') {
          addMessage(data.transcript, true);
          addMessage(data.response, false, {
            model: data.model_used,
            audioUrl: data.audio_url
          });
        } else {
          addMessage('Voice error: ' + (data.message || 'Unknown'), false, { error: true });
        }
      } catch (e) {
        removeTypingIndicator();
        addMessage('Voice error: ' + e.message, false, { error: true });
      }
    } else {
      isRecording = true;
      btn.classList.add('recording');
      try {
        await fetch(`${API_BASE}/start_listening`, { method: 'POST' });
        showToast('Listening... Click mic again to stop');
      } catch (e) {
        isRecording = false;
        btn.classList.remove('recording');
        showToast('Failed to start recording', 'error');
      }
    }
  }

  async function handleImageUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    addMessage(`📷 [Uploaded: ${file.name}]`, true);
    addTypingIndicator();

    const formData = new FormData();
    formData.append('file', file);
    formData.append('prompt', 'Describe this image in detail.');
    
    const model = document.getElementById('modelSelect').value;
    if (model) formData.append('model', model);

    try {
      const res = await fetch(`${API_BASE}/vision`, {
        method: 'POST',
        body: formData
      });
      const data = await res.json();
      removeTypingIndicator();
      if (data.status === 'success') {
        addMessage(data.response_display || data.description, false, {
          model: data.model_used,
          audioUrl: data.audio_url
        });
      } else {
        addMessage('Vision error: ' + (data.detail || 'Unknown'), false, { error: true });
      }
    } catch (e) {
      removeTypingIndicator();
      addMessage('Upload error: ' + e.message, false, { error: true });
    }
    event.target.value = '';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 150) + 'px';
  }

  function showToast(msg, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast show ' + (type === 'error' ? 'error' : '');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  window.addEventListener('load', () => {
    document.getElementById('userInput').focus();
  });
</script>
</body>
</html>
