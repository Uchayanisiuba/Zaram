<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline';" />
    <title>Zaram — Connection Error</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        height: 100%;
        background: #0b0b14;
        color: #e7e7f5;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 24px;
        text-align: center;
        user-select: none;
      }
      .orb {
        width: 64px; height: 64px; border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #ff7b7b, #d63b3b 60%, #661111);
        box-shadow: 0 0 30px rgba(214, 59, 59, 0.5);
      }
      h1 { font-size: 20px; margin: 0; letter-spacing: 1px; }
      p { font-size: 14px; opacity: 0.75; max-width: 420px; margin: 0; line-height: 1.5; }
      .reason {
        font-family: ui-monospace, Menlo, Consolas, monospace;
        font-size: 12px;
        opacity: 0.55;
        max-width: 480px;
        word-break: break-word;
      }
      button {
        margin-top: 6px;
        padding: 10px 22px;
        border: 1px solid #5b2bd6;
        border-radius: 8px;
        background: #5b2bd6;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover { background: #6f3df0; }
      .status { font-size: 12px; opacity: 0.6; }
    </style>
  </head>
  <body>
    <div class="orb"></div>
    <h1>Zaram backend unavailable</h1>
    <p>
      The Zaram desktop runtime could not reach its backend service. This usually
      means Python or the backend process is not running. Zaram will keep trying
      to reconnect automatically.
    </p>
    <p class="reason" id="reason"></p>
    <button onclick="location.reload()">Try again</button>
    <p class="status" id="status">Attempting to reconnect&hellip;</p>
    <script>
      var params = new URLSearchParams(location.search);
      var reason = params.get('reason');
      if (reason) document.getElementById('reason').textContent = reason;
    </script>
  </body>
</html>
