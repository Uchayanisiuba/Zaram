<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline';" />
    <title>Zaram</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        height: 100%;
        background: #0b0b14;
        color: #e7e7f5;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        user-select: none;
      }
      .orb {
        width: 84px;
        height: 84px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #9b6bff, #5b2bd6 60%, #2a1166);
        box-shadow: 0 0 38px rgba(123, 70, 255, 0.65);
        animation: pulse 1.8s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(0.92); opacity: 0.85; }
        50% { transform: scale(1.04); opacity: 1; }
      }
      .title { font-size: 22px; letter-spacing: 4px; font-weight: 600; }
      .sub { font-size: 13px; opacity: 0.7; }
      .spinner {
        width: 16px; height: 16px; border-radius: 50%;
        border: 2px solid rgba(231, 231, 245, 0.25);
        border-top-color: #9b6bff;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="orb"></div>
    <div class="title">ZARAM</div>
    <div class="spinner"></div>
    <div class="sub">Starting desktop runtime&hellip;</div>
  </body>
</html>
